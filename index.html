<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0f172a"/>
<title>Neurox — Elite V2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Orbitron:wght@400;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f172a; --panel: #1e293b; --accent: #6366f1; --cyan: #22d3ee;
  --text: #f8fafc; --muted: #94a3b8; --border: #334155; --success: #22c55e;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Outfit', sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

#app { max-width:500px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; border-left:1px solid var(--border); border-right:1px solid var(--border); }

/* HEADER MEJORADO */
header { padding:15px 20px; display:flex; justify-content:space-between; align-items:center; background:rgba(15,23,42,0.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); z-index:100; }
.logo-box { display:flex; flex-direction:column; }
.logo { font-family:'Orbitron', sans-serif; font-weight:900; color:var(--cyan); letter-spacing:1px; font-size:1.2rem; }
.xp-track { width:80px; height:4px; background:var(--panel); border-radius:2px; margin-top:4px; overflow:hidden; }
#xp-fill { height:100%; background:var(--cyan); width:0%; transition:0.4s; }

/* PANTALLAS */
.screen { display:none; padding:20px; flex-direction:column; gap:20px; height:calc(100vh - 70px); overflow-y:auto; }
.screen.active { display:flex; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* TARJETAS DE SELECCIÓN (ALTA VISIBILIDAD) */
.grid-menu { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
.card-mode { background:var(--panel); border:2px solid var(--border); padding:20px; border-radius:18px; text-align:center; transition:0.2s; cursor:pointer; }
.card-mode:active { transform:scale(0.96); border-color:var(--accent); background:var(--bg); }
.card-icon { font-size:2.2rem; margin-bottom:10px; display:block; }
.card-title { font-weight:800; font-size:0.85rem; letter-spacing:1px; color:var(--text); text-transform:uppercase; }

/* BOTÓN DE SALIDA */
.btn-exit { background:var(--panel); border:1px solid var(--border); color:var(--muted); padding:8px 12px; border-radius:10px; font-size:0.7rem; font-weight:800; cursor:pointer; }

/* INTERFAZ DE JUEGO (CONTRASTE MEJORADO) */
#arena { flex-grow:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; }
.math-display { font-size:3.5rem; font-weight:800; color:var(--text); margin-bottom:40px; text-shadow:0 0 20px rgba(34,211,238,0.2); }
.answer-grid { display:grid; grid-template-columns: 1fr 1fr; gap:15px; width:100%; }
.btn-ans { background:#f8fafc; color:#0f172a; border:none; padding:20px; border-radius:16px; font-size:1.5rem; font-weight:800; cursor:pointer; box-shadow:0 4px 0 #cbd5e1; }
.btn-ans:active { transform:translateY(2px); box-shadow:none; }

/* ENFOQUE GRID */
.focus-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; width:100%; }
.focus-cell { background:var(--panel); border:1px solid var(--border); aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:800; border-radius:8px; color:var(--muted); }

/* OVERLAYS */
.overlay { position:fixed; inset:0; background:var(--bg); z-index:200; display:none; padding:30px; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.overlay.active { display:flex; }
.btn-start { background:var(--accent); color:white; border:none; padding:18px 40px; border-radius:15px; font-family:'Orbitron'; font-weight:900; width:100%; font-size:1rem; margin-top:20px; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo-box">
      <span class="logo">NEUROX</span>
      <div class="xp-track"><div id="xp-fill"></div></div>
    </div>
    <div id="game-controls" style="display:none">
        <button class="btn-exit" onclick="confirmExit()">✕ SALIR</button>
    </div>
    <div id="menu-stats" style="text-align:right">
      <div id="user-lvl" style="font-family:'Orbitron'; font-size:0.8rem; color:var(--cyan)">LVL 1</div>
    </div>
  </header>

  <section id="menu" class="screen active">
    <div style="margin-bottom:10px">
        <h2 style="font-size:1.5rem">Entrenamiento</h2>
        <p style="color:var(--muted); font-size:0.85rem">Selecciona un área para comenzar.</p>
    </div>
    <div class="grid-menu">
      <div class="card-mode" onclick="preLaunch('math')"><span class="card-icon">➕</span><span class="card-title">Cálculo</span></div>
      <div class="card-mode" onclick="preLaunch('focus')"><span class="card-icon">👁️</span><span class="card-title">Enfoque</span></div>
      <div class="card-mode" onclick="preLaunch('logic')"><span class="card-icon">🧩</span><span class="card-title">Lógica</span></div>
      <div class="card-mode" onclick="preLaunch('speed')"><span class="card-icon">⚡</span><span class="card-title">Reflejos</span></div>
    </div>
  </section>

  <section id="game" class="screen">
    <div id="arena"></div>
  </section>

  <div id="overlay-instr" class="overlay">
    <div id="ins-icon" style="font-size:4rem; margin-bottom:20px">🧩</div>
    <h2 id="ins-title" style="font-family:'Orbitron'; margin-bottom:15px; color:var(--cyan)">TÍTULO</h2>
    <p id="ins-body" style="line-height:1.6; color:var(--muted); max-width:300px"></p>
    <button class="btn-start" onclick="startGame()">INICIAR RANGO</button>
  </div>

  <div id="overlay-res" class="overlay">
    <h1 style="font-family:'Orbitron'; color:var(--success)">RESULTADOS</h1>
    <div id="res-xp-gain" style="font-size:3.5rem; font-weight:900; margin:20px 0">+0 XP</div>
    <button class="btn-start" onclick="goHome()">VOLVER AL MENÚ</button>
  </div>
</div>

<script>
/* ── AUDIO ── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(f, t="sine", d=0.1) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

/* ── ESTADO Y PERFIL ── */
let profile = JSON.parse(localStorage.getItem('neurox_v2_p')) || { xp: 0, lvl: 1 };
let currentGame = { mode: '', round: 1, score: 0 };

function updateUI() {
    document.getElementById('user-lvl').innerText = `LVL ${profile.lvl}`;
    document.getElementById('xp-fill').style.width = `${(profile.xp % 1000) / 10}%`;
    localStorage.setItem('neurox_v2_p', JSON.stringify(profile));
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('game-controls').style.display = (id === 'game') ? 'block' : 'none';
    document.getElementById('menu-stats').style.display = (id === 'menu') ? 'block' : 'none';
}

const DESCS = {
    math: { i:'➕', t:'Cálculo Veloz', b:'Resuelve la operación. Los botones son ahora de alto contraste para mejorar la visibilidad.' },
    focus: { i:'👁️', t:'Enfoque Dinámico', b:'Encuentra el carácter intruso. El objetivo y el fondo cambian en cada ronda.' },
    logic: { i:'🧩', t:'Patrón Lógico', b:'Encuentra el número que falta en la secuencia lógica mostrada.' },
    speed: { i:'⚡', t:'Reflejos', b:'Toca los objetivos lo más rápido posible.' }
};

function preLaunch(mode) {
    playSfx(440);
    currentGame = { mode, round: 1, score: 0 };
    const d = DESCS[mode];
    document.getElementById('ins-icon').innerText = d.i;
    document.getElementById('ins-title').innerText = d.t;
    document.getElementById('ins-body').innerText = d.b;
    document.getElementById('overlay-instr').classList.add('active');
}

function startGame() {
    document.getElementById('overlay-instr').classList.remove('active');
    showScreen('game');
    loadRound();
}

function loadRound() {
    if(currentGame.round > 10) { finishGame(); return; }
    const arena = document.getElementById('arena');
    arena.innerHTML = '';

    if(currentGame.mode === 'math') {
        const a = Math.floor(Math.random() * (10 * profile.lvl)) + 2;
        const b = Math.floor(Math.random() * (10 * profile.lvl)) + 2;
        const res = a + b;
        const opts = [res, res + 2, res - 1, res + 10].sort(() => Math.random() - 0.5);
        
        arena.innerHTML = `
            <div class="math-display">${a} + ${b}</div>
            <div class="answer-grid">
                ${opts.map(n => `<button class="btn-ans" onclick="check(${n}, ${res})">${n}</button>`).join('')}
            </div>
        `;
    } 
    else if(currentGame.mode === 'focus') {
        const sets = [["O","0"], ["M","N"], ["E","F"], ["I","1"], ["S","5"], ["X","K"]];
        const currentSet = sets[Math.floor(Math.random()*sets.length)];
        const target = currentSet[1];
        const bg = currentSet[0];
        const targetIdx = Math.floor(Math.random() * 25);
        
        arena.innerHTML = `<div style="margin-bottom:20px; color:var(--cyan)">Busca la "${target}"</div>`;
        const grid = document.createElement('div');
        grid.className = 'focus-grid';
        for(let i=0; i<25; i++) {
            const char = (i === targetIdx) ? target : bg;
            const cell = document.createElement('div');
            cell.className = 'focus-cell';
            cell.innerText = char;
            cell.onclick = () => check(char, target);
            grid.appendChild(cell);
        }
        arena.appendChild(grid);
    }
    else {
        arena.innerHTML = `<div class="card-mode">Modo en construcción</div>`;
        setTimeout(finishGame, 1000);
    }
}

function check(val, target) {
    if(val === target) {
        playSfx(880);
        currentGame.score += 100;
    } else {
        playSfx(220, "sawtooth");
    }
    currentGame.round++;
    loadRound();
}

function confirmExit() {
    if(confirm("¿Seguro que quieres salir? Perderás el progreso de esta ronda.")) {
        goHome();
    }
}

function goHome() {
    document.getElementById('overlay-res').classList.remove('active');
    showScreen('menu');
}

function finishGame() {
    const gain = Math.floor(currentGame.score * (profile.lvl * 0.5));
    profile.xp += gain;
    profile.lvl = Math.floor(profile.xp / 1000) + 1;
    updateUI();
    document.getElementById('res-xp-gain').innerText = `+${gain} XP`;
    document.getElementById('overlay-res').classList.add('active');
}

updateUI();
</script>
</body>
</html>
