<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0f172a"/>
<title>Neurox — Elite Progression</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0b0f1a; --panel: #161b2e; --accent: #4f46e5; --cyan: #06b6d4;
  --text: #f8fafc; --muted: #64748b; --border: #1e293b; 
  --success: #10b981; --danger: #ef4444; --light: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Outfit', sans-serif; background:var(--bg); color:var(--text); overflow:hidden; touch-action: manipulation; }

#app { max-width:500px; margin:0 auto; height:100vh; display:flex; flex-direction:column; position:relative; background:var(--bg); }

/* HEADER & PROGRESO */
header { padding:15px 20px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.logo { font-family:'Orbitron', sans-serif; font-weight:900; color:var(--cyan); font-size:1.1rem; }
.xp-mini { font-size:0.7rem; color:var(--muted); font-family:'Orbitron'; }

/* SELECCIÓN DE NIVEL */
.level-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; padding:10px 0; }
.lvl-btn { aspect-ratio:1; border-radius:8px; border:1px solid var(--border); background:var(--panel); color:var(--muted); display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; font-size:0.9rem; }
.lvl-btn.unlocked { border-color:var(--cyan); color:var(--text); }
.lvl-btn.current { background:var(--cyan); color:var(--bg); border-color:var(--cyan); box-shadow:0 0 10px var(--cyan); }
.lvl-btn.locked { opacity:0.3; cursor:not-allowed; }

/* PANTALLAS */
.screen { display:none; padding:20px; flex-direction:column; flex-grow:1; overflow-y:auto; }
.screen.active { display:flex; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* CARDS DE MODO */
.menu-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:15px; }
.card-mode { background:var(--panel); border:1px solid var(--border); padding:20px; border-radius:16px; text-align:center; cursor:pointer; }
.card-mode:active { transform:scale(0.95); }
.card-icon { font-size:2rem; display:block; margin-bottom:8px; }

/* ARENA & UI JUEGO */
#arena { flex-grow:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; position:relative; }
.btn-ans { background:var(--light); color:#000; border:none; padding:18px; border-radius:12px; font-size:1.5rem; font-weight:900; width:100%; cursor:pointer; box-shadow:0 4px 0 #cbd5e1; }
.btn-ans:active { transform:translateY(4px); box-shadow:none; }
.ans-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; width:100%; max-width:380px; }

/* REFLEJOS EXPERTO */
#target { position:absolute; border-radius:50%; cursor:pointer; display:none; z-index:100; transition: transform 0.1s; }

/* OVERLAYS */
.overlay { position:fixed; inset:0; background:rgba(11,15,26,0.98); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
.overlay.active { display:flex; }
.btn-main { background:var(--accent); color:white; border:none; padding:16px 0; border-radius:12px; width:100%; max-width:280px; font-weight:900; font-family:'Orbitron'; cursor:pointer; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div>
      <div class="logo">NEUROX</div>
      <div class="xp-mini" id="xp-display">XP: 0</div>
    </div>
    <button id="btn-back" style="display:none; background:none; border:none; color:var(--muted); font-weight:800;" onclick="showHome()">✕ SALIR</button>
  </header>

  <section id="screen-home" class="screen active">
    <h2 style="font-size:1.4rem; font-family:'Orbitron'">Módulos</h2>
    <div class="menu-grid">
      <div class="card-mode" onclick="showLevels('math')"><span class="card-icon">➕</span>Cálculo</div>
      <div class="card-mode" onclick="showLevels('focus')"><span class="card-icon">👁️</span>Enfoque</div>
      <div class="card-mode" onclick="showLevels('logic')"><span class="card-icon">🧩</span>Lógica</div>
      <div class="card-mode" onclick="showLevels('speed')"><span class="card-icon">⚡</span>Reflejos</div>
    </div>
  </section>

  <section id="screen-levels" class="screen">
    <h2 id="level-title" style="font-family:'Orbitron'; color:var(--cyan)">NIVELES</h2>
    <div class="level-grid" id="level-container"></div>
  </section>

  <section id="screen-game" class="screen">
    <div id="game-hud" style="text-align:center; font-family:'Orbitron'; font-size:0.7rem; color:var(--cyan); margin-bottom:10px;">RONDA 1/10</div>
    <div id="arena">
        <div id="target"></div>
    </div>
  </section>

  <div id="overlay-res" class="overlay">
    <h2 id="res-status" style="font-family:'Orbitron'; font-size:2rem">COMPLETADO</h2>
    <div id="res-msg" style="margin:15px 0; color:var(--muted)">Has desbloqueado el siguiente nivel.</div>
    <button class="btn-main" onclick="showHome()">CONTINUAR</button>
  </div>
</div>

<script>
/* ── MOTOR DE AUDIO ── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(f, t="sine", d=0.1) {
    if(audioCtx.state==='suspended') audioCtx.resume();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+d);
}

/* ── PERSISTENCIA ── */
let profile = JSON.parse(localStorage.getItem('neurox_progression')) || {
    xp: 0,
    unlocks: { math: 1, focus: 1, logic: 1, speed: 1 }
};

function save() {
    localStorage.setItem('neurox_progression', JSON.stringify(profile));
    document.getElementById('xp-display').innerText = `XP: ${profile.xp}`;
}

/* ── NAVEGACIÓN ── */
let currentMode = '';
let currentLevel = 1;
let gameState = { round: 1, score: 0, active: false };

function showHome() {
    gameState.active = false;
    document.querySelectorAll('.screen, .overlay').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-home').classList.add('active');
    document.getElementById('btn-back').style.display = 'none';
    save();
}

function showLevels(mode) {
    currentMode = mode;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-levels').classList.add('active');
    document.getElementById('btn-back').style.display = 'block';
    
    const container = document.getElementById('level-container');
    container.innerHTML = '';
    const unlocked = profile.unlocks[mode];

    for(let i=1; i<=30; i++) {
        const btn = document.createElement('div');
        btn.className = `lvl-btn ${i < unlocked ? 'unlocked' : (i === unlocked ? 'current' : 'locked')}`;
        btn.innerText = i;
        if(i <= unlocked) btn.onclick = () => startLevel(i);
        container.appendChild(btn);
    }
}

/* ── LÓGICA DE JUEGO ── */
function startLevel(lvl) {
    currentLevel = lvl;
    gameState = { round: 1, score: 0, active: true };
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-game').classList.add('active');
    loadRound();
}

function loadRound() {
    if(gameState.round > 10) { finishGame(); return; }
    document.getElementById('game-hud').innerText = `NIVEL ${currentLevel} • RONDA ${gameState.round}/10`;
    const arena = document.getElementById('arena');
    arena.innerHTML = '';
    
    if(currentMode === 'math') renderMath(arena);
    if(currentMode === 'focus') renderFocus(arena);
    if(currentMode === 'logic') renderLogic(arena);
    if(currentMode === 'speed') renderSpeedExpert();
}

/* ── MODO REFLEJOS EXPERTO (MEJORADO) ── */
function renderSpeedExpert() {
    const arena = document.getElementById('arena');
    arena.innerHTML = `<div id="target"></div><div style="color:var(--muted); font-size:0.8rem">¡Rápido!</div>`;
    const target = document.getElementById('target');
    
    // Dificultad basada en nivel
    const size = Math.max(30, 80 - (currentLevel * 1.5)); // Más pequeño cada nivel
    const speed = Math.max(400, 1500 - (currentLevel * 35)); // Desaparece más rápido
    const isMoving = currentLevel > 10;
    
    target.style.width = size + 'px';
    target.style.height = size + 'px';
    target.style.backgroundColor = (Math.random() > 0.2) ? 'var(--danger)' : 'var(--cyan)';
    
    const maxX = arena.offsetWidth - size;
    const maxY = arena.offsetHeight - size;
    target.style.left = Math.random() * maxX + 'px';
    target.style.top = Math.random() * maxY + 'px';
    target.style.display = 'block';

    let moveInterval;
    if(isMoving) {
        let vx = (Math.random() - 0.5) * (currentLevel / 2);
        let vy = (Math.random() - 0.5) * (currentLevel / 2);
        moveInterval = setInterval(() => {
            let x = parseFloat(target.style.left) + vx;
            let y = parseFloat(target.style.top) + vy;
            if(x < 0 || x > maxX) vx *= -1;
            if(y < 0 || y > maxY) vy *= -1;
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }, 20);
    }

    const timeout = setTimeout(() => {
        clearInterval(moveInterval);
        if(target.style.display !== 'none') {
            target.style.display = 'none';
            handleAns(false);
        }
    }, speed);

    target.onclick = () => {
        clearTimeout(timeout);
        clearInterval(moveInterval);
        target.style.display = 'none';
        playSfx(800);
        handleAns(true);
    };
}

/* ── OTROS MODOS (ESCALADOS) ── */
function renderMath(arena) {
    const factor = currentLevel * 5;
    const a = Math.floor(Math.random() * factor) + currentLevel;
    const b = Math.floor(Math.random() * factor) + currentLevel;
    const res = a + b;
    const opts = [res, res + Math.floor(Math.random()*10)+1, res - Math.floor(Math.random()*5)-1, a+b+2].sort(()=>Math.random()-0.5);
    
    arena.innerHTML = `<div style="font-size:3rem; font-weight:900; margin-bottom:30px">${a} + ${b}</div>`;
    const grid = document.createElement('div'); grid.className = 'ans-grid';
    opts.forEach(o => {
        const btn = document.createElement('button'); btn.className = 'btn-ans'; btn.innerText = o;
        btn.onclick = () => handleAns(o === res);
        grid.appendChild(btn);
    });
    arena.appendChild(grid);
}

function renderFocus(arena) {
    const size = currentLevel < 10 ? 4 : (currentLevel < 20 ? 5 : 6);
    const sets = [["8","B"], ["O","0"], ["M","N"], ["E","F"], ["S","5"]];
    const set = sets[Math.floor(Math.random()*sets.length)];
    const targetIdx = Math.floor(Math.random() * (size*size));
    
    arena.style.display = 'grid';
    arena.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
    arena.style.gap = '8px';
    arena.style.padding = '20px';

    for(let i=0; i < (size*size); i++) {
        const cell = document.createElement('div');
        cell.className = 'btn-ans';
        cell.style.padding = '10px'; cell.style.fontSize = '1.2rem';
        cell.innerText = (i === targetIdx) ? set[1] : set[0];
        cell.onclick = () => {
            arena.style.display = 'flex'; // Reset
            handleAns(i === targetIdx);
        };
        arena.appendChild(cell);
    }
}

function renderLogic(arena) {
    const diff = Math.floor(Math.random() * 5) + Math.floor(currentLevel/3) + 1;
    const start = Math.floor(Math.random() * 20);
    const seq = [start, start + diff, start + (diff*2), start + (diff*3)];
    const res = start + (diff*4);
    
    arena.innerHTML = `<div style="font-size:2rem; font-weight:900; margin-bottom:30px">${seq.join(', ')}, ?</div>`;
    const grid = document.createElement('div'); grid.className = 'ans-grid';
    [res, res+diff, res-1, res+2].sort(()=>Math.random()-0.5).forEach(o => {
        const btn = document.createElement('button'); btn.className = 'btn-ans'; btn.innerText = o;
        btn.onclick = () => handleAns(o === res);
        grid.appendChild(btn);
    });
    arena.appendChild(grid);
}

function handleAns(correct) {
    if(!gameState.active) return;
    if(correct) { playSfx(1000); gameState.score++; }
    else { playSfx(200, "sawtooth"); }
    gameState.round++;
    setTimeout(loadRound, 300);
}

function finishGame() {
    gameState.active = false;
    const passed = gameState.score >= 8; // Necesitas 8/10 para desbloquear el siguiente
    const gain = gameState.score * currentLevel * 10;
    profile.xp += gain;
    
    if(passed && currentLevel === profile.unlocks[currentMode] && currentLevel < 30) {
        profile.unlocks[currentMode]++;
    }
    
    document.getElementById('res-status').innerText = passed ? "¡NIVEL SUPERADO!" : "NIVEL FALLIDO";
    document.getElementById('res-status').style.color = passed ? "var(--success)" : "var(--danger)";
    document.getElementById('res-msg').innerText = passed ? `Desbloqueaste el siguiente nivel. (+${gain} XP)` : "Necesitas al menos 8 aciertos. Reintenta.";
    document.getElementById('overlay-res').classList.add('active');
    save();
}

save(); // Init UI
</script>
</body>
</html>
