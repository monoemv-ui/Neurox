<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neurox PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
--bg:#0f1226;--card:#1b1f3a;--accent:#6c63ff;--accent2:#22d3ee;--text:#f1f5f9;--muted:#94a3b8;
}
body{margin:0;font-family:'Inter',sans-serif;background:linear-gradient(160deg,#0f1226,#1b1f3a);color:var(--text)}
header{display:flex;justify-content:space-between;padding:16px}
.logo{font-weight:700;color:var(--accent)}
.hud{display:flex;gap:10px}
.hud-item{background:var(--card);padding:10px;border-radius:10px;text-align:center}
.screen{display:none;padding:20px}
.screen.active{display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--card);padding:16px;border-radius:14px;cursor:pointer}
.btn{background:var(--accent);border:none;padding:12px;border-radius:10px;color:white;cursor:pointer}
select{padding:8px;border-radius:8px;margin-top:10px}
</style>
</head>
<body>

<header>
<div class="logo">Neurox PRO</div>
<div class="hud">
<div class="hud-item"><div id="score">0</div><small>PTS</small></div>
<div class="hud-item"><div id="level">1</div><small>LVL</small></div>
<div class="hud-item"><div id="combo">0</div><small>COMBO</small></div>
</div>
</header>

<section id="home" class="screen active">
<h2>Selecciona modo</h2>
<div class="grid">
<div class="card" onclick="startGame('pairs')">🃏 PARES</div>
<div class="card" onclick="startGame('simon')">🎮 SIMON</div>
<div class="card" onclick="startGame('reaction')">⚡ REFLEJOS</div>
<div class="card" onclick="startGame('memory')">🧠 MEMORIA</div>
</div>

<select id="difficulty">
<option value="easy">Fácil</option>
<option value="medium">Medio</option>
<option value="hard">Difícil</option>
</select>
</section>

<section id="game" class="screen">
<h2 id="mode"></h2>
<p id="status"></p>
<button class="btn" onclick="simulatePlay()">Acción</button>
<button class="btn" onclick="fail()">Fallar</button>
</section>

<section id="result" class="screen">
<h2>Resultado</h2>
<p id="final"></p>
<button class="btn" onclick="goHome()">Inicio</button>
</section>

<script>
let score=0,combo=0;
let difficulty='easy';
let player={xp:parseInt(localStorage.getItem('xp')||0),level:parseInt(localStorage.getItem('lvl')||1)};

function $(id){return document.getElementById(id)}
function show(s){document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));$(s).classList.add('active')}

function startGame(mode){
score=0;combo=0;
difficulty=$("difficulty").value;
$("mode").textContent=mode.toUpperCase();
$("status").textContent="Dificultad: "+difficulty;
show('game');
updateHUD();
}

function simulatePlay(){
let base={easy:50,medium:100,hard:160}[difficulty];
combo++;
let pts=Math.floor((base+Math.random()*50)*(1+combo*0.2));
score+=pts;
addXP(pts);
updateHUD();
}

function fail(){combo=0;updateHUD();}

function addXP(x){
player.xp+=x;
let need=player.level*100;
while(player.xp>=need){player.xp-=need;player.level++;need=player.level*100;}
localStorage.setItem('xp',player.xp);
localStorage.setItem('lvl',player.level);
}

function updateHUD(){
$('score').textContent=score;
$('level').textContent=player.level;
$('combo').textContent=combo;
}

function goHome(){show('home')}

updateHUD();
</script>

</body>
</html>
